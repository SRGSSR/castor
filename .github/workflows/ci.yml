---
name: CI

on:  # yamllint disable-line rule:truthy
  merge_group:
  pull_request:

jobs:
  check-quality:
    name: 🔎 Check quality
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: |
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #  v6.0.2

      - name: Run the quality check
        run: make check-quality

  test:
    name: 🧪 Test
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: |
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #  v6.0.2

      - name: Run test
        run: make test

      - name: Publish report
        uses: |
          mikepenz/action-junit-report\
          @bccf2e31636835cf0874589931c4116687171386 #  v6.4.0
        if: always()
        with:
          report_paths: 'fastlane/test_output/*.xml'
          check_name: 📋 Unit test report
          fail_on_failure: true

  build-demo:
    name: 🔨 Build
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: |
          actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #  v6.0.2

      - name: Skip plugin validation
        run: |
          defaults write com.apple.dt.Xcode \
          IDESkipPackagePluginFingerprintValidatation -bool YES

      - name: Build the demo
        run: make build
