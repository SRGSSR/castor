---
name: CI

on:  # yamllint disable-line rule:truthy
  merge_group:
  pull_request:

jobs:
  check-quality:
    name: 🔎 Check quality
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  #  v7.0.0

      - name: Run the quality check
        run: make check-quality

  test:
    name: 🧪 Test
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  #  v7.0.0

      - name: Run test
        run: make test

      - name: Publish report
        uses: mikepenz/action-junit-report@d9f48fc87bc235f7e214acf696ca5abc0a986f16  #  v6.4.2
        if: always()
        with:
          report_paths: 'fastlane/test_output/*.xml'
          check_name: 📋 Unit test report
          fail_on_failure: true

  build-demo:
    name: 🔨 Build
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  #  v7.0.0

      - name: Skip plugin validation
        run: |
          defaults write com.apple.dt.Xcode \
          IDESkipPackagePluginFingerprintValidatation -bool YES

      - name: Build the demo
        run: make build
